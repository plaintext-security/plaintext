name: Link check

# Catches dead/redirected links across the curriculum before learners hit them.
# Runs weekly (link rot is continuous) and on PRs that touch curriculum Markdown.
# Reports only — it does NOT gate the Pages deploy (transient 429/5xx shouldn't block publishing);
# the weekly run opens/refreshes a tracking issue when links break.

on:
  schedule:
    - cron: "0 7 * * 1"        # Mondays 07:00 UTC
  pull_request:
    paths: ["tracks/**/*.md"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write                # weekly run files a tracking issue on failure

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --accept 200,206,429
            --exclude-mail
            --exclude localhost
            'tracks/**/*.md'
          fail: false           # don't fail the job on broken links; we surface them via issue/summary
      - name: Open/refresh tracking issue (scheduled only)
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links found by the weekly link check"
          content-filepath: ./lychee/out.md
          labels: link-rot

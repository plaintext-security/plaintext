site_name: Plaintext
site_description: Open security education for everyone. No paywalls. No gatekeeping. Forever free.
site_url: https://plaintext-security.github.io/plaintext/
repo_url: https://github.com/plaintext-security/plaintext
repo_name: plaintext-security/plaintext
copyright: CC BY 4.0 — use it, share it, build on it.

# The curriculum Markdown under tracks/ is the source; MkDocs builds it into site/.
docs_dir: tracks
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: black
    accent: light green
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Comments via giscus (GitHub Discussions). Live: IDs below are filled in.
# Regenerate via https://giscus.app (or the GraphQL discussionCategories query)
# if categories are renamed or the repo moves.
extra:
  giscus:
    repo: plaintext-security/plaintext
    repo_id: "R_kgDOSzzNhw"  # GraphQL node ID of plaintext-security/plaintext
    category_feedback: "DIC_kwDOSzzNh84C-xCe"  # category ID for "Feedback"
    category_hints: "DIC_kwDOSzzNh84C-xCl"     # category ID for "Hints"
    category_general: "DIC_kwDOSzzNh84C-w3p"   # category ID for "General"

